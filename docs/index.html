<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    :root {
      --navy:       #1e3a5f;
      --navy-dim:   #0c2640;
      --navy-light: #2a4d7a;
      --teal:       #0d9488;
      --teal-light: #14b8a6;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at 50% 0%, var(--navy) 0%, var(--navy-dim) 70%);
      color: #e0f2fe;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      text-align: center;
      background: var(--navy);
      border: 1px solid var(--navy-light);
      border-radius: 16px;
      padding: 44px 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    .headline {
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
    }
    .sub {
      font-size: .95rem;
      line-height: 1.6;
      color: #b8cbe0;
    }
    .sub a {
      color: var(--teal-light);
      font-weight: 600;
      text-decoration: none;
    }
    .sub a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <p class="headline">Temporarily unavailable</p>
    <p class="sub">Please refer to
      <a href="https://www.appic.org/" target="_blank" rel="noopener noreferrer">APPIC.org</a>
      for APPIC internship site information.</p>
  </div>
</body>
</html>
