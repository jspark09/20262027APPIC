<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APPIC Internship Explorer — Temporarily Unavailable</title>
  <style>
    :root {
      --navy:       #1e3a5f;
      --navy-dim:   #0c2640;
      --teal-light: #14b8a6;
      --text-muted: #64748b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--navy-dim);
      color: #e0f2fe;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      text-align: center;
      background: var(--navy);
      border-radius: 12px;
      padding: 40px 32px;
      box-shadow: 0 10px 40px rgba(0,0,0,.3);
    }
    p { font-size: .95rem; line-height: 1.6; color: #cbd5e1; }
  </style>
</head>
<body>
  <div class="card">
    <p>Please refer to the
      <a href="https://www.appic.org/Internships/Search-the-AI-and-AOI" style="color: var(--teal-light);">official APPIC directory</a>.</p>
